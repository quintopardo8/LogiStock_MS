server:
  port: 8084

spring:
  application:
    name: logistock-ms-04-cliente
  
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:logiStock_MS_04}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Fernandabravo.88}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true

logging:
  file:
    name: logs/microservice-cliente.log
  level:
    org.springframework.web: INFO

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: LogiStock_MS_04_Cliente.controller